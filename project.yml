name: Manana
options:
  bundleIdPrefix: com.wonji
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

# DEVELOPMENT_TEAM intentionally lives in Local.xcconfig (gitignored) rather
# than here — it's a per-developer Apple ID/team, not something to commit
# and hand to every clone of this repo. Copy Local.xcconfig.example to
# Local.xcconfig and fill in your own team ID to build to a real device.
configFiles:
  Debug: Local.xcconfig
  Release: Local.xcconfig

settings:
  base:
    SWIFT_VERSION: "5.0"
    PRODUCT_NAME: "$(TARGET_NAME)"
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
    INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "오늘의 날씨에 맞는 배경과 문장을 보여주기 위해 위치 정보가 필요해요."
    INFOPLIST_KEY_UIUserInterfaceStyle: Automatic
    INFOPLIST_KEY_CFBundleDisplayName: "Mañana"
    # Only ever calls HTTPS endpoints (Cloudflare Worker weather proxy, Google
    # Sheets CSV export) — no custom/non-exempt crypto — so this answers the
    # Export Compliance question at upload time instead of asking every build.
    INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
    MARKETING_VERSION: "0.1.5"
    CURRENT_PROJECT_VERSION: "6"

targets:
  Manana:
    type: application
    platform: iOS
    sources:
      - path: Manana
    entitlements:
      path: Manana/Manana.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.wonji.manana
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wonji.manana
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Manana/Info.plist
      properties:
        UIAppFonts:
          - "YoonChildfundkoreaDaeHan.ttf"
          - "YoonChildfundkoreaManSeh.ttf"
          - "YoonChildfundkoreaMinGuk.ttf"
    dependencies:
      - target: MananaWidgetExtension
        embed: true

  MananaWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: MananaWidget
      - path: Manana/Shared
      - path: Manana/Resources/Fonts
    entitlements:
      path: MananaWidget/MananaWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.wonji.manana
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wonji.manana.widget
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: MananaWidget/Info.plist
